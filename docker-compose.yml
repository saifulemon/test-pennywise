# Ports: Backend=3100 | PostgreSQL=5532 | Redis=6479 | Frontend=5273
# Auto-generated docker-compose.yml for pennywise

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pennywise-backend
    restart: unless-stopped
    ports:
      - '3100:3000'
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
    volumes:
      - ./backend/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pennywise-network

  postgres:
    image: postgres:16-alpine
    container_name: pennywise-postgres
    restart: unless-stopped
    ports:
      - '5532:5432'
    environment:
      - POSTGRES_DB=${POSTGRES_DATABASE:-pennywise}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pennywise-network

  redis:
    image: redis:7-alpine
    container_name: pennywise-redis
    restart: unless-stopped
    ports:
      - '6479:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pennywise-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pennywise-frontend
    restart: unless-stopped
    ports:
      - '5273:5173'
    volumes:
      - ./frontend/src:/app/src
    networks:
      - pennywise-network

volumes:
  postgres-data:
  redis-data:

networks:
  pennywise-network:
    driver: bridge
